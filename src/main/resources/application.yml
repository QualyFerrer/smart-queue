spring:
  application:
    name: smartqueue

  # ==========================================
  # BANCO DE DADOS PRINCIPAL (PostgreSQL)
  # ==========================================
  datasource:
    url: jdbc:postgresql://localhost:5432/smartqueue
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # validate: o Hibernate confere se as entidades batem com o banco,
      # mas NÃO cria nem altera tabelas — isso é responsabilidade do Flyway
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    # O Flyway vai procurar os arquivos SQL nessa pasta

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

server:
  port: 8080

jwt:
  secret: smartqueue-secret-key-deve-ter-256-bits-minimo-para-hs256
  expiration: 86400000  # 24h

  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html