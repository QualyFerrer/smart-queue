spring:
  application:
    name: smartqueue

  # ==========================================
  # BANCO DE DADOS PRINCIPAL (PostgreSQL)
  # ==========================================
  datasource:
    url: jdbc:postgresql://localhost:5432/smartqueue
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # ==========================================
  # JPA / HIBERNATE
  # ==========================================
  jpa:
    hibernate:
      # validate: o Hibernate confere se as entidades batem com o banco,
      # mas NÃO cria nem altera tabelas — isso é responsabilidade do Flyway
      ddl-auto: validate
    show-sql: true        # mostra as queries SQL no console (útil para debug)
    properties:
      hibernate:
        format_sql: true  # formata o SQL pra ficar legível no console

  # ==========================================
  # FLYWAY (migrations)
  # ==========================================
  flyway:
    enabled: true
    locations: classpath:db/migration
    # O Flyway vai procurar os arquivos SQL nessa pasta

  # ==========================================
  # REDIS
  # ==========================================
  data:
    redis:
      host: localhost
      port: 6379
      # Sem senha por enquanto (ambiente local)

  # ==========================================
  # CACHE
  # ==========================================
  cache:
    type: redis

# ==========================================
# SERVIDOR
# ==========================================
server:
  port: 8080

# ==========================================
# JWT (configuração customizada — não é do Spring)
# ==========================================
jwt:
  secret: smartqueue-secret-key-deve-ter-256-bits-minimo-para-hs256
  expiration: 86400000  # 24 horas em milissegundos

# ==========================================
# SWAGGER / SPRINGDOC
# ==========================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html